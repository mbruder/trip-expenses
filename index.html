<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ENE EME"/>
  <meta name="theme-color" content="#111111"/>
  <title>ENE EME — Gastos</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --ink: #111111;
      --paper: #f8f8f6;
      --cream: #eeeeee;
      --accent: #c84b2f;
      --accent2: #e05c3a;
      --gold: #c9963a;
      --muted: #888888;
      --border: #dddddd;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
      --nav-h: 64px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      inset: 0;
      bottom: calc(var(--nav-h) + var(--safe-bottom));
      top: var(--safe-top);
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      display: none;
      flex-direction: column;
      background: var(--paper);
    }
    .screen.active { display: flex; }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--ink);
      color: var(--paper);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .topbar-sub {
      font-size: 11px;
      opacity: 0.55;
      letter-spacing: 1px;
      margin-top: 1px;
    }
    .topbar-badge {
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: var(--ink);
      display: flex;
      align-items: flex-start;
      padding-top: 4px;
      padding-bottom: var(--safe-bottom);
      z-index: 100;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 4px;
      cursor: pointer;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .nav-btn.active { color: var(--paper); }
    .nav-btn .nav-icon { font-size: 1.4rem; line-height: 1; }

    /* FAB */
    .fab {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
      right: 20px;
      width: 56px; height: 56px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 1.6rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(200,75,47,0.45);
      z-index: 90;
      transition: transform 0.15s, background 0.2s;
    }
    .fab:active { transform: scale(0.92); background: var(--accent2); }

    /* ── SUMMARY STRIP ── */
    .summary-strip {
      display: flex;
      gap: 0;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .summary-chip {
      flex: 1;
      padding: 14px 12px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .summary-chip:last-child { border-right: none; }
    .summary-chip-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
    .summary-chip-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; font-weight: 700; margin-top: 2px; }

    /* ── EXPENSE CARDS ── */
    .expenses-list {
      flex: 1;
      padding: 12px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .expense-card {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideUp 0.25s ease both;
    }
    .expense-card-left { flex: 1; min-width: 0; }
    .expense-card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .expense-card-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .expense-card-amount {
      font-weight: 700;
      color: var(--accent);
      font-size: 15px;
      white-space: nowrap;
    }
    .expense-card-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .cat-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-comida { background: #e67e22; }
    .dot-transporte { background: #2980b9; }
    .dot-alojamiento { background: #8e44ad; }
    .dot-actividades { background: #27ae60; }
    .dot-compras { background: #e74c3c; }
    .dot-otro { background: var(--muted); }

    .expense-card-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .ticket-thumb {
      width: 44px; height: 44px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .delete-btn {
      background: none;
      border: none;
      color: var(--border);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    .delete-btn:active { color: var(--accent); }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      padding: 48px 24px;
      text-align: center;
    }
    .empty-icon { font-size: 3rem; opacity: 0.35; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--ink); }
    .empty-sub { font-size: 13px; }

    .loading-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .loading-state .spin { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }

    /* ── ADD FORM SHEET ── */
    #addSheet {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
    }
    #addSheet.open { display: block; }

    .sheet-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
    }

    .sheet-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--paper);
      border-radius: 20px 20px 0 0;
      max-height: 92vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(24px + var(--safe-bottom));
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    }
    #addSheet.open .sheet-panel { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .sheet-header {
      padding: 16px 20px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sheet-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
    }
    .sheet-close {
      width: 32px; height: 32px;
      background: var(--cream);
      border: none;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }

    .sheet-body { padding: 8px 20px 0; }

    /* FORM FIELDS */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent);
    }
    .field textarea { resize: none; min-height: 80px; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .amount-row { display: flex; gap: 10px; }
    .amount-row .field:first-child { flex: 1.4; }
    .amount-row .field:last-child { flex: 1; }

    .amount-wrap { position: relative; }
    .amount-wrap input { padding-left: 28px; }
    .currency-sym {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--muted);
      pointer-events: none;
    }

    /* TICKET UPLOAD */
    .ticket-upload-area {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 18px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .ticket-upload-area:active { border-color: var(--accent); }
    .upload-icon { font-size: 1.5rem; margin-bottom: 4px; }
    .upload-label { font-size: 13px; font-weight: 500; color: var(--muted); }
    .upload-hint { font-size: 11px; color: var(--border); margin-top: 3px; }

    .ticket-preview { display: none; }
    .ticket-preview img { width: 100%; max-height: 160px; object-fit: contain; border-radius: 8px; border: 1px solid var(--border); background: var(--cream); }
    .ticket-preview-actions { display: flex; gap: 8px; margin-top: 8px; }
    .ticket-preview-btn {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 8px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--paper);
      cursor: pointer;
      color: var(--muted);
      text-align: center;
    }
    .ticket-preview-btn:active { border-color: var(--accent); color: var(--accent); }

    .uploading-bar {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
      padding: 8px 0;
    }
    .uploading-bar .spin { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }

    /* SUBMIT BTN */
    .submit-btn {
      width: 100%;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .submit-btn:active { background: var(--accent); transform: scale(0.98); }
    .submit-btn:disabled { background: var(--muted); }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 100%; max-height: 90vh; object-fit: contain; border-radius: 8px; }
    .lightbox-close {
      position: absolute;
      top: calc(16px + var(--safe-top));
      right: 20px;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── LOGIN ── */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 24px;
    }
    #loginScreen.hidden { opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }

    .login-card {
      background: var(--paper);
      border-radius: 20px;
      padding: 40px 28px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .login-logo { font-size: 2.5rem; margin-bottom: 16px; }
    .login-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .login-input {
      width: 100%;
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      text-align: center;
      letter-spacing: 3px;
      color: var(--ink);
      outline: none;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-error { font-size: 12px; color: var(--accent); min-height: 18px; margin-bottom: 12px; }
    .login-btn {
      width: 100%;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:active { background: var(--accent); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--paper);
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 500;
      border-left: 3px solid var(--accent);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-left-color: #e74c3c; }

    /* ── TRIP FILTER ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--paper);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .filter-chip.active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">✈️</div>
    <div class="login-title">Gastos de Viaje</div>
    <p class="login-sub">ENE EME Producciones S.A.</p>
    <input class="login-input" type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password"/>
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn">Ingresar</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="Ticket"/>
</div>

<!-- SCREEN: GASTOS -->
<div class="screen active" id="screenGastos">
  <div class="topbar">
    <div>
      <div class="topbar-title">Mis Gastos</div>
      <div class="topbar-sub">ENE EME Producciones</div>
    </div>
    <span class="topbar-badge" id="topBadge">0</span>
  </div>

  <div class="summary-strip" id="summaryStrip" style="display:none">
    <div class="summary-chip">
      <div class="summary-chip-label">Gastos</div>
      <div class="summary-chip-val" id="totalCount">0</div>
    </div>
    <div class="summary-chip">
      <div class="summary-chip-label">Viajes</div>
      <div class="summary-chip-val" id="tripsCount">0</div>
    </div>
    <div class="summary-chip">
      <div class="summary-chip-label">Último</div>
      <div class="summary-chip-val" id="latestTrip" style="font-size:0.85rem">—</div>
    </div>
  </div>

  <div class="filter-bar" id="filterBar"></div>

  <div class="loading-state" id="loadingState">
    <div class="spin"></div>
    <span>Cargando gastos...</span>
  </div>

  <div class="expenses-list" id="expensesList" style="display:none"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">🗺️</div>
    <div class="empty-title">Sin gastos todavía</div>
    <div class="empty-sub">Tocá el botón + para registrar tu primer gasto</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="navGastos" onclick="switchTab('Gastos')">
    <span class="nav-icon">💳</span>
    Gastos
  </button>
  <button class="nav-btn" id="navResumen" onclick="switchTab('Resumen')">
    <span class="nav-icon">🔍</span>
    Resumen
  </button>
</nav>

<!-- FAB -->
<button class="fab" id="fabBtn" onclick="openSheet()">＋</button>

<!-- FILE INPUTS at body level - outside any overflow/transform containers -->
<input type="file" id="ticketInputCamera" accept="image/*" capture="environment" style="position:fixed;top:-9999px;left:-9999px;opacity:0;width:1px;height:1px;"/>
<input type="file" id="ticketInputGallery" accept="image/*" style="position:fixed;top:-9999px;left:-9999px;opacity:0;width:1px;height:1px;"/>

<!-- ADD SHEET -->
<div id="addSheet">
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet-panel">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">Nuevo Gasto</div>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body">
      <form id="expenseForm">
        <div class="row-2">
          <div class="field">
            <label>Viaje</label>
            <input type="text" id="trip_name" placeholder="ej. Bariloche" required/>
          </div>
          <div class="field">
            <label>Fecha</label>
            <input type="date" id="date" required/>
          </div>
        </div>

        <div class="row-2">
          <div class="field">
            <label>¿Quién pagó?</label>
            <input type="text" id="paid_by" placeholder="ej. Martín" required/>
          </div>
          <div class="field">
            <label>Categoría</label>
            <select id="category">
              <option value="comida">🍜 Comida</option>
              <option value="transporte">✈️ Transporte</option>
              <option value="alojamiento">🏨 Alojamiento</option>
              <option value="actividades">🎭 Actividades</option>
              <option value="compras">🛍️ Compras</option>
              <option value="otro">📦 Otro</option>
            </select>
          </div>
        </div>

        <div class="amount-row">
          <div class="field">
            <label>Monto</label>
            <div class="amount-wrap">
              <span class="currency-sym">$</span>
              <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required/>
            </div>
          </div>
          <div class="field">
            <label>Moneda</label>
            <select id="currency">
              <option value="ARS" selected>ARS $</option>
              <option value="USD">USD $</option>
              <option value="EUR">EUR €</option>
              <option value="BRL">BRL R$</option>
              <option value="UYU">UYU $</option>
              <option value="CLP">CLP $</option>
              <option value="GBP">GBP £</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Descripción (opcional)</label>
          <textarea id="description" placeholder="¿En qué fue este gasto?"></textarea>
        </div>

        <div class="field">
          <label>Foto del Ticket (opcional)</label>
          <canvas id="compressCanvas" style="display:none"></canvas>
          <div id="ticketUploadArea" style="display:flex;gap:10px;">
            <button type="button" onclick="document.getElementById('ticketInputCamera').click()" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 10px;background:var(--cream);border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;">
              <span style="font-size:1.8rem">📷</span>
              Sacar foto
            </button>
            <button type="button" onclick="document.getElementById('ticketInputGallery').click()" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 10px;background:var(--cream);border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;">
              <span style="font-size:1.8rem">🖼️</span>
              Desde galería
            </button>
          </div>
          <div class="ticket-preview" id="ticketPreview">
            <img id="ticketPreviewImg" src="" alt="Vista previa"/>
            <div class="ticket-preview-actions">
              <button type="button" class="ticket-preview-btn" id="changeTicketBtn">↩ Cambiar</button>
              <button type="button" class="ticket-preview-btn" id="removeTicketBtn">✕ Quitar</button>
            </div>
          </div>
          <div class="uploading-bar" id="uploadingBar">
            <div class="spin"></div>
            <span>Subiendo ticket...</span>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Registrar Gasto</button>
      </form>
    </div>
  </div>
</div>

<!-- SCREEN: RESUMEN (rendered dynamically) -->
<div class="screen" id="screenResumen">
  <div class="topbar">
    <div>
      <div class="topbar-title">Resumen</div>
      <div class="topbar-sub" id="resumenSub">Total general</div>
    </div>
  </div>
  <div class="filter-bar" id="filterBarResumen"></div>
  <div id="resumenContent" style="padding:16px 16px 24px; flex:1; overflow-y:auto;"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://okfduhjgyxoqqmnboiin.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rZmR1aGpneXhvcXFtbmJvaWluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTAwMjYsImV4cCI6MjA4OTU2NjAyNn0.zXVf5T4p_pRAWiW7VTi9qRZyAr0xu3fCzWeF1D9xBiY';
  const PASS = 'ene123@';
  const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

  let allExpenses = [];
  let activeTrip = 'todos';

  // ── AUTH ──
  function checkAuth() { return sessionStorage.getItem('te_auth') === '1'; }
  function unlock() {
    const val = document.getElementById('passwordInput').value;
    if (val === PASS) {
      sessionStorage.setItem('te_auth', '1');
      const s = document.getElementById('loginScreen');
      s.classList.add('hidden');
      setTimeout(() => s.style.display = 'none', 350);
      loadExpenses();
    } else {
      document.getElementById('loginError').textContent = 'Contraseña incorrecta. Intentá de nuevo.';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }
  document.getElementById('loginBtn').addEventListener('click', unlock);
  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') unlock();
    document.getElementById('loginError').textContent = '';
  });
  if (checkAuth()) { document.getElementById('loginScreen').style.display = 'none'; }

  // ── TABS ──
  function switchTab(tab) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('screen' + tab).classList.add('active');
    document.getElementById('nav' + tab).classList.add('active');
    document.getElementById('fabBtn').style.display = tab === 'Gastos' ? 'flex' : 'none';
    if (tab === 'Resumen') renderResumen();
  }

  // ── SHEET ──
  function openSheet() {
    document.getElementById('addSheet').classList.add('open');
    document.getElementById('date').valueAsDate = new Date();
  }
  function closeSheet() { document.getElementById('addSheet').classList.remove('open'); }
  document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);

  // ── TOAST ──
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3500);
  }

  // ── LIGHTBOX ──
  document.getElementById('lightboxClose').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
  document.getElementById('lightbox').addEventListener('click', e => { if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open'); });
  function openLightbox(url) { document.getElementById('lightboxImg').src = url; document.getElementById('lightbox').classList.add('open'); }

  // ── IMAGE COMPRESSION ──
  function compressImage(file) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const MAX = 900;
        let w = img.width, h = img.height;
        if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        const canvas = document.getElementById('compressCanvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.75);
      };
      img.src = url;
    });
  }

  let pendingTicketBlob = null;
  function showUploadArea() {
    pendingTicketBlob = null;
    document.getElementById('ticketUploadArea').style.display = 'flex';
    document.getElementById('ticketPreview').style.display = 'none';
  }
  function showPreview(blob, url) {
    pendingTicketBlob = blob;
    document.getElementById('ticketPreviewImg').src = url;
    document.getElementById('ticketUploadArea').style.display = 'none';
    document.getElementById('ticketPreview').style.display = 'block';
  }
  document.getElementById('changeTicketBtn').addEventListener('click', () => document.getElementById('ticketInputGallery').click());
  document.getElementById('removeTicketBtn').addEventListener('click', showUploadArea);

  async function handleTicketFile(file) {
    if (!file) return;
    const blob = await compressImage(file);
    showPreview(blob, URL.createObjectURL(blob));
  }
  document.getElementById('ticketInputCamera').addEventListener('change', e => { handleTicketFile(e.target.files[0]); e.target.value = ''; });
  document.getElementById('ticketInputGallery').addEventListener('change', e => { handleTicketFile(e.target.files[0]); e.target.value = ''; });

  async function uploadTicket(blob) {
    const filename = `ticket_${Date.now()}.jpg`;
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/tickets/${filename}`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'image/jpeg', 'x-upsert': 'true' },
      body: blob
    });
    if (!res.ok) throw new Error(await res.text());
    return `${SUPABASE_URL}/storage/v1/object/public/tickets/${filename}`;
  }

  // ── HELPERS ──
  function formatDate(d) { return new Date(d + 'T12:00:00').toLocaleDateString('es-AR', { day: 'numeric', month: 'short', year: 'numeric' }); }
  function formatAmount(amount, currency) {
    const syms = { ARS:'$', USD:'US$', EUR:'€', BRL:'R$', UYU:'$U', CLP:'$', GBP:'£' };
    return `${syms[currency]||''}${parseFloat(amount).toLocaleString('es-AR', { minimumFractionDigits:2, maximumFractionDigits:2 })} ${currency}`;
  }
  const catColors = { comida:'#e67e22', transporte:'#2980b9', alojamiento:'#8e44ad', actividades:'#27ae60', compras:'#e74c3c', otro:'#95a5a6' };

  // ── LOAD ──
  async function loadExpenses() {
    document.getElementById('loadingState').style.display = 'flex';
    document.getElementById('expensesList').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/expenses?order=date.desc,created_at.desc`, { headers });
      if (!res.ok) throw new Error(await res.text());
      allExpenses = await res.json();
      renderExpenses();
    } catch(e) {
      console.error(e);
      document.getElementById('loadingState').style.display = 'none';
      showToast('No se pudieron cargar los gastos.', true);
    }
  }

  function renderExpenses() {
    document.getElementById('loadingState').style.display = 'none';
    const data = activeTrip === 'todos' ? allExpenses : allExpenses.filter(e => e.trip_name === activeTrip);

    // Summary
    const trips = [...new Set(allExpenses.map(e => e.trip_name))];
    document.getElementById('topBadge').textContent = allExpenses.length;
    if (allExpenses.length) {
      document.getElementById('totalCount').textContent = allExpenses.length;
      document.getElementById('tripsCount').textContent = trips.length;
      document.getElementById('latestTrip').textContent = allExpenses[0].trip_name;
      document.getElementById('summaryStrip').style.display = 'flex';
    }

    // Filter chips
    const filterBar = document.getElementById('filterBar');
    filterBar.innerHTML = '';
    const allChip = document.createElement('button');
    allChip.className = 'filter-chip' + (activeTrip === 'todos' ? ' active' : '');
    allChip.textContent = 'Todos';
    allChip.onclick = () => { activeTrip = 'todos'; renderExpenses(); };
    filterBar.appendChild(allChip);
    trips.forEach(trip => {
      const chip = document.createElement('button');
      chip.className = 'filter-chip' + (activeTrip === trip ? ' active' : '');
      chip.textContent = trip;
      chip.onclick = () => { activeTrip = trip; renderExpenses(); };
      filterBar.appendChild(chip);
    });

    if (!data.length) {
      document.getElementById('expensesList').style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
      return;
    }

    document.getElementById('emptyState').style.display = 'none';
    const list = document.getElementById('expensesList');
    list.style.display = 'flex';
    list.innerHTML = '';

    data.forEach((exp, i) => {
      const card = document.createElement('div');
      card.className = 'expense-card';
      card.style.animationDelay = `${i * 0.04}s`;

      const ticketHtml = exp.ticket_url
        ? `<img class="ticket-thumb" src="${exp.ticket_url}" alt="ticket" onclick="openLightbox('${exp.ticket_url}')"/>`
        : '';

      card.innerHTML = `
        <div class="expense-card-left">
          <div class="expense-card-top">
            <span class="expense-card-name">${exp.description || exp.trip_name}</span>
            <span class="expense-card-amount">${formatAmount(exp.amount, exp.currency)}</span>
          </div>
          <div class="expense-card-meta">
            <span class="cat-dot dot-${exp.category}" style="background:${catColors[exp.category]||'#999'}"></span>
            <span>${exp.category}</span>
            <span>·</span>
            <span>${exp.paid_by || '—'}</span>
            <span>·</span>
            <span>${formatDate(exp.date)}</span>
          </div>
        </div>
        <div class="expense-card-right">
          ${ticketHtml}
          <button class="delete-btn" onclick="deleteExpense('${exp.id}','${exp.ticket_url||''}')">✕</button>
        </div>
      `;
      list.appendChild(card);
    });
  }

  // ── RESUMEN ──
  let activeTripResumen = 'todos';

  function renderResumen() {
    const el = document.getElementById('resumenContent');
    if (!allExpenses.length) { el.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px 0">Sin datos todavía</p>'; return; }

    // Build trip filter chips
    const trips = [...new Set(allExpenses.map(e => e.trip_name))];
    const filterBar = document.getElementById('filterBarResumen');
    filterBar.innerHTML = '';
    const allChip = document.createElement('button');
    allChip.className = 'filter-chip' + (activeTripResumen === 'todos' ? ' active' : '');
    allChip.textContent = 'Todos';
    allChip.onclick = () => { activeTripResumen = 'todos'; renderResumen(); };
    filterBar.appendChild(allChip);
    trips.forEach(trip => {
      const chip = document.createElement('button');
      chip.className = 'filter-chip' + (activeTripResumen === trip ? ' active' : '');
      chip.textContent = trip;
      chip.onclick = () => { activeTripResumen = trip; renderResumen(); };
      filterBar.appendChild(chip);
    });

    const data = activeTripResumen === 'todos' ? allExpenses : allExpenses.filter(e => e.trip_name === activeTripResumen);
    document.getElementById('resumenSub').textContent = activeTripResumen === 'todos' ? 'Total general' : activeTripResumen;

    // Group by currency for grand total
    const byCurrency = {};
    data.forEach(e => {
      const c = e.currency || 'ARS';
      byCurrency[c] = (byCurrency[c] || 0) + parseFloat(e.amount);
    });

    // By category
    const byCat = {};
    data.forEach(e => {
      if (!byCat[e.category]) byCat[e.category] = {};
      const c = e.currency || 'ARS';
      if (!byCat[e.category][c]) byCat[e.category][c] = { total: 0, count: 0 };
      byCat[e.category][c].total += parseFloat(e.amount);
      byCat[e.category][c].count++;
    });

    // By person
    const byPerson = {};
    data.forEach(e => {
      const p = e.paid_by || 'Sin nombre';
      if (!byPerson[p]) byPerson[p] = {};
      const c = e.currency || 'ARS';
      if (!byPerson[p][c]) byPerson[p][c] = { total: 0, count: 0 };
      byPerson[p][c].total += parseFloat(e.amount);
      byPerson[p][c].count++;
    });

    const formatAmt = (amount, currency) => {
      const syms = { ARS:'$', USD:'US$', EUR:'€', BRL:'R$', UYU:'$U', CLP:'$', GBP:'£' };
      return `${syms[currency]||''}${parseFloat(amount).toLocaleString('es-AR', { minimumFractionDigits:2, maximumFractionDigits:2 })} ${currency}`;
    };

    const totalAmounts = Object.entries(byCurrency).map(([c, t]) => formatAmt(t, c)).join(' + ');
    const maxCatTotal = Math.max(...Object.values(byCat).map(cv => Object.values(cv).reduce((s,v)=>s+v.total,0)));

    let html = '';

    // ── GRAND TOTAL CARD ──
    html += `
      <div style="background:var(--ink);color:var(--paper);border-radius:16px;padding:20px;margin-bottom:20px">
        <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;opacity:0.6;margin-bottom:6px">Total gastado</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;font-weight:700;line-height:1.2">${totalAmounts}</div>
        <div style="font-size:12px;opacity:0.5;margin-top:6px">${data.length} gasto${data.length !== 1 ? 's' : ''} · ${trips.length > 1 && activeTripResumen === 'todos' ? trips.length + ' viajes' : (activeTripResumen === 'todos' ? '1 viaje' : activeTripResumen)}</div>
      </div>
    `;

    // ── BY CATEGORY ──
    html += `<div style="font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Por categoría</div>`;
    html += `<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px">`;
    Object.entries(byCat).sort((a,b) => {
      const ta = Object.values(a[1]).reduce((s,v)=>s+v.total,0);
      const tb = Object.values(b[1]).reduce((s,v)=>s+v.total,0);
      return tb - ta;
    }).forEach(([cat, currencies]) => {
      const catTotal = Object.values(currencies).reduce((s,v)=>s+v.total,0);
      const catCount = Object.values(currencies).reduce((s,v)=>s+v.count,0);
      const pct = Math.round(catTotal / maxCatTotal * 100);
      const color = catColors[cat] || '#999';
      const amountsStr = Object.entries(currencies).map(([c,v]) => formatAmt(v.total, c)).join(' · ');
      html += `
        <div style="background:var(--cream);border-radius:12px;padding:14px 16px;border:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="width:10px;height:10px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0"></span>
              <span style="font-weight:600;text-transform:capitalize">${cat}</span>
            </div>
            <span style="font-weight:700;color:var(--accent);font-size:13px">${amountsStr}</span>
          </div>
          <div style="background:var(--border);border-radius:4px;height:5px;overflow:hidden">
            <div style="background:${color};height:100%;width:${pct}%;border-radius:4px"></div>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:5px">${catCount} gasto${catCount !== 1 ? 's' : ''}</div>
        </div>
      `;
    });
    html += `</div>`;

    // ── BY PERSON ──
    html += `<div style="font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Por persona</div>`;
    html += `<div style="display:flex;flex-direction:column;gap:10px">`;
    Object.entries(byPerson).sort((a,b) => {
      const ta = Object.values(a[1]).reduce((s,v)=>s+v.total,0);
      const tb = Object.values(b[1]).reduce((s,v)=>s+v.total,0);
      return tb - ta;
    }).forEach(([person, currencies]) => {
      const personCount = Object.values(currencies).reduce((s,v)=>s+v.count,0);
      const amountsStr = Object.entries(currencies).map(([c,v]) => formatAmt(v.total, c)).join(' · ');
      html += `
        <div style="background:var(--cream);border-radius:12px;padding:14px 16px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:600">${person}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${personCount} gasto${personCount !== 1 ? 's' : ''}</div>
          </div>
          <div style="font-weight:700;color:var(--accent);font-size:13px;text-align:right">${amountsStr}</div>
        </div>
      `;
    });
    html += `</div>`;

    el.innerHTML = html;
  }

  // ── DELETE ──
  async function deleteExpense(id, ticketUrl) {
    if (!confirm('¿Eliminar este gasto?')) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/expenses?id=eq.${id}`, { method: 'DELETE', headers });
      if (!res.ok) throw new Error();
      if (ticketUrl) {
        const filename = ticketUrl.split('/tickets/')[1];
        if (filename) await fetch(`${SUPABASE_URL}/storage/v1/object/tickets/${filename}`, {
          method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
      }
      showToast('Gasto eliminado.');
      loadExpenses();
    } catch { showToast('No se pudo eliminar.', true); }
  }

  // ── SUBMIT ──
  document.getElementById('expenseForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Guardando...';
    let ticket_url = null;
    if (pendingTicketBlob) {
      document.getElementById('uploadingBar').style.display = 'flex';
      try { ticket_url = await uploadTicket(pendingTicketBlob); }
      catch(err) {
        console.error(err);
        showToast('No se pudo subir la foto del ticket.', true);
        btn.disabled = false; btn.textContent = 'Registrar Gasto';
        document.getElementById('uploadingBar').style.display = 'none';
        return;
      }
      document.getElementById('uploadingBar').style.display = 'none';
    }
    const payload = {
      trip_name: document.getElementById('trip_name').value.trim(),
      paid_by: document.getElementById('paid_by').value.trim(),
      category: document.getElementById('category').value,
      amount: parseFloat(document.getElementById('amount').value),
      currency: document.getElementById('currency').value,
      description: document.getElementById('description').value.trim() || null,
      date: document.getElementById('date').value,
      ticket_url
    };
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/expenses`, { method: 'POST', headers, body: JSON.stringify(payload) });
      if (!res.ok) throw new Error(await res.text());
      showToast('Gasto registrado ✓');
      document.getElementById('expenseForm').reset();
      showUploadArea();
      closeSheet();
      loadExpenses();
    } catch(err) {
      console.error(err); showToast('Error al guardar.', true);
    } finally { btn.disabled = false; btn.textContent = 'Registrar Gasto'; }
  });

  if (checkAuth()) loadExpenses();
</script>
</body>
</html>
